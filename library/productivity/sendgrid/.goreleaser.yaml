version: 2
project_name: sendgrid-pp-cli
changelog:
  disable: true
builds:
  - id: sendgrid-pp-cli
    main: ./cmd/sendgrid-pp-cli
    binary: sendgrid-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/sendgrid/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: sendgrid-pp-mcp
    main: ./cmd/sendgrid-pp-mcp
    binary: sendgrid-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: sendgrid-pp-cli
    repository:
      owner: nathan-kettles
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Twilio SendGrid endpoint, plus offline suppression diffs, stats time-series rollups, and a template-variable..."
    install: |
      bin.install "sendgrid-pp-cli"
      bin.install "sendgrid-pp-mcp"
